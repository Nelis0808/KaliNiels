<!DOCTYPE html>
<!--
  TOURNAMENT PAGE
  Single-elimination bracket for deciding between any list of
  options. Logic lives in assets/js/modules/tournament.js — this
  file only contains the three "screens" (setup / match / winner),
  toggled by adding/removing the `.hidden` utility class.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Kan je niet kiezen? Laat je opties het tegen elkaar opnemen, toernooi-stijl.">
  <meta name="theme-color" content="#7B68EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <title>Toernooi</title>

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/tournament.css">
</head>
<body>
  <a class="skip-link" href="#main">Ga naar inhoud</a>

  <noscript>
    <p style="text-align:center; padding:1rem; background:#FFD700;">
      Deze pagina heeft JavaScript nodig om het toernooi te spelen.
    </p>
  </noscript>

  <header class="navbar">
    <div class="container nav">
      <div class="logo">Tournament</div>

      <button id="menuBtn" class="icon-btn" aria-label="Menu openen" aria-expanded="false" aria-controls="navLinks">☰</button>

      <nav id="navLinks" class="nav-links" aria-label="Hoofdmenu">
        <a href="index.html">Home</a>
        <a href="date.html">Date Ideeën</a>
        <a href="tournament.html">Toernooi</a>

        <div id="navMoreDropdown" class="nav-dropdown">
          <button id="navMoreBtn" class="nav-dropdown-trigger" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-controls="navMoreMenu">
            Meer <span class="chevron" aria-hidden="true">▾</span>
          </button>
          <div id="navMoreMenu" class="nav-dropdown-menu" role="menu"></div>
        </div>
      </nav>

      <div class="nav-actions">
        <div id="navSettingsDropdown" class="settings-dropdown">
          <button id="navSettingsBtn" class="icon-btn settings-trigger" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-controls="navSettingsMenu" aria-label="Instellingen">⚙️</button>
          <div id="navSettingsMenu" class="settings-menu" role="menu" aria-label="Instellingen">
            <div class="settings-menu-heading">Instellingen</div>

            <div class="settings-item">
              <span class="settings-item-label">🌙 Dark mode</span>
              <button id="themeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet donkere modus aan"></button>
            </div>

            <div class="settings-item">
              <span class="settings-item-label">🎨 Pink theme</span>
              <button id="colorThemeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet roze thema aan"></button>
            </div>

            <!-- Auto-filled by assets/js/modules/settings-dropdown.js from
                 siteConfig.settings — disabled "Binnenkort" placeholders. -->
            <div id="settingsExtra"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="hero" class="hero">
      <div class="container">
        <h1>Kan je niet kiezen? (zoals wel vaker)</h1>
        <p>Laat opties het tegen elkaar opnemen tot er één winnaar overblijft.</p>
      </div>
    </section>

    <section class="container" id="tournamentApp">
      <!-- ============ SCREEN 1: setup ============ -->
      <div id="tournamentSetup">
        <p>Eén optie per regel, minstens 2 opties. Of gebruik een voorbeeldlijst:</p>

        <div class="tournament-presets">
          <button id="presetIndoor" class="btn btn-outline" type="button">Gebruik binnen ideeën</button>
          <button id="presetOutdoor" class="btn btn-outline" type="button">Gebruik buiten ideeën</button>
        </div>

        <label for="tournamentOptions" class="sr-only">Opties, één per regel</label>
        <textarea id="tournamentOptions" placeholder="Sushi&#10;Sushi1&#10;Pasta&#10;Burgers&#10;Sushi maar dan hier"></textarea>

        <p id="tournamentError" class="tournament-error" role="alert"></p>

        <button id="tournamentStart" class="btn btn-primary btn-lg mt-1" type="button">Start toernooi</button>
      </div>

      <!-- ============ SCREEN 2: current match ============ -->
      <div id="tournamentMatch" class="hidden">
        <p id="tournamentProgress" class="tournament-progress" aria-live="polite"></p>

        <div class="match">
          <button id="matchOptionA" class="match-option" type="button"></button>
          <div class="match-vs" aria-hidden="true">VS</div>
          <button id="matchOptionB" class="match-option" type="button"></button>
        </div>
      </div>

      <!-- ============ SCREEN 3: winner ============ -->
      <div id="tournamentWinner" class="hidden tournament-winner">
        <h2>🏆 Winnaar: <span id="tournamentWinnerName"></span></h2>
        <button id="tournamentRestart" class="btn btn-primary mt-2" type="button">Nieuw toernooi</button>

        <ul id="tournamentHistory" class="tournament-history"></ul>
      </div>
    </section>
  </main>

  <button id="backToTop" class="icon-btn" aria-label="Naar boven scrollen">↑</button>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
