<!DOCTYPE html>
<!--
  ONZE REIZEN — WORLD MAP PAGE
  Landing page for the travel section: a real-geography SVG world
  map (assets/data/world-map.json, Natural Earth data — see
  assets/js/modules/geo-render.js) with a pin per country in
  assets/data/travel-countries.json, pannable with drag/wheel/pinch
  (assets/js/modules/map-pan-zoom.js). Click/tap a pin to go
  straight to that country's own full page (reizen/land.html?iso=XX)
  — no intermediate modal. Everything here is local static data —
  no external site, nothing that can block a scraper. Logic lives
  in assets/js/modules/reizen.js — this file only contains markup.

  Lives at the site root (like index.html, games-hub.html, ...) —
  the country-specific full pages live one level down in reizen/
  (see reizen/land.html), same split as games-hub.html vs games/*.html.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Een interactieve kaart van alle landen waar we zijn geweest en nog naartoe willen.">
  <meta name="theme-color" content="#7B68EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <title>Onze Reizen</title>

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/reizen.css">
</head>
<body>
  <a class="skip-link" href="#main">Ga naar inhoud</a>

  <noscript>
    <p style="text-align:center; padding:1rem; background:#FFD700;">
      Deze pagina heeft JavaScript nodig om de kaart te tonen.
    </p>
  </noscript>

  <div data-include="header"></div>

  <main id="main">
    <!-- LOCK SCREEN — shown until logged in via the "👤 Profiel"
         dropdown in the sticky header (assets/js/modules/auth.js +
         page-gate.js). Onze Reizen (title, map, pins, city names AND
         the real photos) is fully private, not just the photo bytes —
         so even the hero title/intro below lives INSIDE the gated
         content, not above it. -->
    <section class="container rz-lockscreen" data-gate-lockscreen>
      <div class="rz-lockscreen-card">
        <p class="rz-lockscreen-emoji" aria-hidden="true">🔒</p>
        <h2>Deze pagina is privé</h2>
        <p>Log in via <strong>👤 Profiel</strong> rechtsboven om de reiskaart en foto's te bekijken.</p>
        <p class="rz-lockscreen-who" data-gate-who></p>
      </div>
    </section>

    <div class="hidden" data-gate-content>
      <section id="hero" class="hero">
        <div class="container">
          <h1>🌍 Onze Reizen</h1>
          <p>Sleep om te verschuiven, scroll of knijp om te zoomen. Beweeg over een pin voor de naam, klik om naar dat land te gaan.</p>
        </div>
      </section>

      <section class="container" id="reizenApp">
      <p id="reizenStatus" class="rz-status" aria-live="polite">Landen laden…</p>

      <div class="rz-map-viewport-wrap">
        <div class="rz-map-controls">
          <button type="button" id="reizenZoomIn" class="rz-zoom-btn" aria-label="Inzoomen">+</button>
          <button type="button" id="reizenZoomReset" class="rz-zoom-btn rz-zoom-reset" aria-label="Zoom resetten">⤢</button>
          <button type="button" id="reizenZoomOut" class="rz-zoom-btn" aria-label="Uitzoomen">−</button>
        </div>

        <div id="reizenMapViewport" class="rz-map-viewport">
          <div id="reizenMapFrame" class="rz-map-frame">
            <!-- World map SVG + country pins injected directly into this frame by assets/js/modules/reizen.js -->
          </div>
        </div>
      </div>

      <div class="rz-legend">
        <span class="rz-legend-item"><span class="rz-legend-dot rz-legend-dot-visited" aria-hidden="true"></span> Al geweest</span>
        <span class="rz-legend-item"><span class="rz-legend-dot rz-legend-dot-wishlist" aria-hidden="true"></span> Verlanglijstje</span>
      </div>
      </section>
    </div>

    <!-- Synchronous, runs immediately (before main.js's module script,
         which is deferred by default) — reads the same shared auth
         session as assets/js/modules/auth.js and toggles the
         lockscreen/content right away. Without this, the lockscreen
         (visible by default in the markup above) briefly flashes on
         every navigation to/from reizen/land.html even when you're
         already logged in, until page-gate.js gets around to hiding
         it. page-gate.js still runs as normal afterwards and stays
         the source of truth for any later login/logout. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('siteAuth');
          var auth = raw ? JSON.parse(raw) : null;
          var authed = !!(auth && auth.token && auth.exp && auth.exp * 1000 > Date.now());
          var lockscreen = document.querySelector('[data-gate-lockscreen]');
          var content = document.querySelector('[data-gate-content]');
          if (lockscreen && content) {
            lockscreen.classList.toggle('hidden', authed);
            content.classList.toggle('hidden', !authed);
          }
        } catch (e) { /* leave default (logged-out) markup as-is */ }
      })();
    </script>
  </main>

  <div data-include="chrome-end"></div>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
