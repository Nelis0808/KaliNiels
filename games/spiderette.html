<!DOCTYPE html>
<!--
  SPIDERETTE PAGE
  Single-deck patience game, 7 tableau columns (triangular deal: 1
  card in column 1 up to 7 cards in column 7). This is the
  RELAXED-PLACEMENT variant: any card can be placed on any other card
  one rank higher, regardless of suit/colour — but only a full,
  same-COLOUR King-to-Ace run ever clears off the board, and doing so
  removes the stock/staple from play for the rest of the game. Ends
  with a winning screen once all 4 sequences are cleared. Logic lives
  in assets/js/modules/spiderette.js — this file only contains the
  layout + (optional) login form, same "one script, guarded init
  function" pattern as every other game page (see blackjack.html for
  the near-identical login-bar structure).

  LOGIN IS OPTIONAL: logging in (same shared site-wide session as
  every other gated feature — see the "👤 Profiel" dropdown in the
  sticky header, assets/js/modules/auth.js) unlocks the "special"
  card face variant (aces/faces/jokers) AND a shared chip balance
  with BlackJack — winning a full game pays 1000 chips, leaving
  early via "Terug" costs 100. As a guest you can still play, just
  without any chips shown or tracked.

  Lives in the games/ subfolder, same relative-path rules as the
  other game pages (see tictactoe.html's comment for details).
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Spiderette: los alle vier de kleurreeksen op, met een klik-en-leg patience-bord van 7 kolommen.">
  <meta name="theme-color" content="#7B68EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <title>Spiderette</title>

  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/pages/games.css">
  <link rel="stylesheet" href="../assets/css/pages/spiderette.css">
</head>
<body>
  <a class="skip-link" href="#main">Ga naar inhoud</a>

  <noscript>
    <p style="text-align:center; padding:1rem; background:#FFD700;">
      Deze pagina heeft JavaScript nodig om te kunnen spelen.
    </p>
  </noscript>

  <div data-include="header"></div>

  <main id="main">
    <section id="hero" class="hero">
      <div class="container">
        <h1>🕷️ Spiderette</h1>
        <p>Leg elke kaart op een kaart van precies één hoger, ongeacht de kleur — 
            maar alleen een volledige reeks van dezelfde kleur (Heer t/m Aas) verdwijnt van het bord.</p>
      </div>
    </section>

    <section class="container" id="spiApp">
      <button id="spiBackBtn" type="button" class="btn btn-outline ttt-back">&larr; Terug naar Games</button>

      <!-- Chip balance, only shown when logged in (see spiderette.js's
           updateAuthUI). Logging in/out happens ONCE, site-wide, via
           the "👤 Profiel" dropdown in the sticky header
           (assets/js/modules/auth.js). -->
      <div id="spiChipsBar" class="spi-chips-bar hidden" aria-live="polite">
        <span class="spi-chips-label">Chips</span>
        <span id="spiBalance" class="spi-chips-value">0</span>
      </div>


      <p id="spiStatus" class="ttt-status" aria-live="polite"></p>

      <!-- Stock (click to deal a wave of cards onto the columns, one
           card per column, 7/7/7/3 across 4 waves — see
           spiderette.js) + the completed-sequence tray. Once the
           first same-colour King-to-Ace run clears, this stock is
           removed from play for the rest of the game. -->
      <div class="spi-top-row">
        <button id="spiStock" type="button" class="spi-stock" aria-label="Deel kaarten van de stok">
          <img src="../assets/icons/playing-cards/card-back-blue.png" alt="" class="spi-stock-img">
          <span id="spiStockCount" class="spi-stock-count">0</span>
        </button>

        <div id="spiCompleted" class="spi-completed" aria-label="Voltooide reeksen">""</div>
      </div>

      <!-- Tableau -->
      <div id="spiBoard" class="spi-board"></div>

      <div class="ttt-actions">
        <button id="spiUndo" class="btn btn-outline" type="button" title="Zet je laatste beurt terug — kost 50 credits (Backspace werkt ook)">⌫ Back</button>
        <button id="spiNewGame" class="btn btn-primary" type="button">Nieuw spel</button>
      </div>

      <!-- Winning screen: hidden by default, shown once all 4
           same-colour King-to-Ace sequences are cleared. -->
      <div id="spiWinOverlay" class="spi-win-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="spiWinTitle">
        <div class="spi-win-card">
          <p class="spi-win-emoji" aria-hidden="true">🕷️🎉</p>
          <h2 id="spiWinTitle">Gewonnen!</h2>
          <p>Alle vier de reeksen zijn compleet. Goed gespeeld!</p>
          <p id="spiWinPayout" class="spi-win-payout"></p>
          <button id="spiWinPlayAgain" class="btn btn-primary" type="button">Nog een keer spelen</button>
        </div>
      </div>
    </section>
  </main>

  <!-- <div data-include="chrome-end"></div> Commented out, same reason as connect4.html -->

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
