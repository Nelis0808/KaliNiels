<!DOCTYPE html>
<!--
  HOME PAGE
  The "hub" page: shows the days-together counter and a grid of
  cards linking to every feature page. The card grid is rendered
  by JS (assets/js/modules/home-cards.js) from the single source
  of truth in assets/js/config.js — add a new feature page there,
  not here.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">

  <!-- This is a private, personal site — keep it out of search engines.
       Remove this tag if you ever want the site publicly discoverable. -->
  <meta name="robots" content="noindex, nofollow">

  <meta name="description" content="Onze persoonlijke site vol date ideeën en herinneringen.">
  <meta name="theme-color" content="#7B68EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <title>Home</title>

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

  <!-- Google Fonts: Fraunces for headings, Inter for body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- main.css = shared design system, always first.
       pages/home.css = rules unique to this page only. -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/home.css">
</head>
<body>
  <!-- Keyboard users can jump straight past the header to the content -->
  <a class="skip-link" href="#main">Ga naar inhoud</a>

  <noscript>
    <p style="text-align:center; padding:1rem; background:#FFD700;">
      Deze site werkt het best met JavaScript ingeschakeld.
    </p>
  </noscript>

  <!-- ============ Shared header — kept identical on every page ============ -->
  <header class="navbar">
    <div class="container nav">
      <div class="logo">Home</div>

      <button id="menuBtn" class="icon-btn" aria-label="Menu openen" aria-expanded="false" aria-controls="navLinks">☰</button>

      <nav id="navLinks" class="nav-links" aria-label="Hoofdmenu">
        <a href="index.html">Home</a>
        <a href="date.html">Date Ideeën</a>
        <a href="tournament.html">Toernooi</a>

        <div id="navMoreDropdown" class="nav-dropdown">
          <button id="navMoreBtn" class="nav-dropdown-trigger" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-controls="navMoreMenu">
            Meer <span class="chevron" aria-hidden="true">▾</span>
          </button>
          <div id="navMoreMenu" class="nav-dropdown-menu" role="menu"></div>
        </div>
      </nav>

      <div class="nav-actions">
        <div id="navSettingsDropdown" class="settings-dropdown">
          <button id="navSettingsBtn" class="icon-btn settings-trigger" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-controls="navSettingsMenu" aria-label="Instellingen">⚙️</button>
          <div id="navSettingsMenu" class="settings-menu" role="menu" aria-label="Instellingen">
            <div class="settings-menu-heading">Instellingen</div>

            <div class="settings-item">
              <span class="settings-item-label">🌙 Dark mode</span>
              <button id="themeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet donkere modus aan"></button>
            </div>

            <div class="settings-item">
              <span class="settings-item-label">🎨 Pink theme</span>
              <button id="colorThemeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet roze thema aan"></button>
            </div>

            <!-- Auto-filled by assets/js/modules/settings-dropdown.js from
                 siteConfig.settings — disabled "Binnenkort" placeholders. -->
            <div id="settingsExtra"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="page-guide" class="container">
      <h1 class="text-center">
        Samen voor <u><span id="daysTogether">0</span></u> dagen
        <span class="heart-beat" aria-hidden="true">❤️</span>
      </h1>
      <h2 class="text-center">Klik om naar de specifieke pagina te gaan!</h2>

      <!-- Populated by assets/js/modules/home-cards.js from siteConfig.pages -->
      <div id="pageCardsGrid" class="cards-grid"></div>
    </section>
  </main>

  <button id="backToTop" class="icon-btn" aria-label="Naar boven scrollen">↑</button>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
