name = "todo-lijst"
main = "worker.js"
compatibility_date = "2025-01-01"

# Binds your KV namespace to this worker as `env.TODO_KV`. Create the
# namespace first (Cloudflare dashboard > Workers & Pages > KV >
# Create namespace), then either fill in its id below and run
# `wrangler deploy`, OR just add the binding via the dashboard
# (Worker > Settings > Bindings > KV Namespace) if you're not using
# the CLI — see STAPPENPLAN-TODO-SNACKS.md.
[[kv_namespaces]]
binding = "TODO_KV"
id = "todo-lijst"

# No secrets needed for this worker — same reasoning as the shopping
# list Worker, nothing here is sensitive enough to need a login.
