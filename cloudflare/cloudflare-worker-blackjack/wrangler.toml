name = "blackjack"
main = "worker.js"
compatibility_date = "2025-01-01"

# Binds your KV namespace to this worker as `env.CHIPS_KV`. Create the
# namespace first (Cloudflare dashboard > Workers & Pages > KV >
# Create namespace), then either fill in its id below and run
# `wrangler deploy`, OR just add the binding via the dashboard
# (Worker > Settings > Bindings > KV Namespace) if you're not using
# the CLI — see STAPPENPLAN-BLACKJACK.md.
[[kv_namespaces]]
binding = "CHIPS_KV"
id = "YOUR-KV-NAMESPACE-ID"

# To manually set someone's chip count: Cloudflare dashboard >
# Workers & Pages > KV > (this namespace) > find key "a" or "b" >
# edit the value (a plain integer, e.g. "5000") > Save. The worker
# always reads this fresh, so the change takes effect the next time
# that person's balance is loaded — no redeploy needed.

# Secrets (PASSPHRASE_A, PASSPHRASE_B, TOKEN_SECRET) are NOT set here.
# After deploying, run:
#   wrangler secret put PASSPHRASE_A
#   wrangler secret put PASSPHRASE_B
#   wrangler secret put TOKEN_SECRET
# (or set them via the dashboard: Settings > Variables and Secrets > Add > Encrypt.)
#
# Reuse the SAME passphrases as the photo gallery worker if you want
# one login to feel consistent across pages, or pick different ones
# — the two workers don't know about each other either way.
