<!DOCTYPE html>
<!--
  DATE IDEAS PAGE
  Picks a random idea from assets/data/date-ideas-indoor.json or
  date-ideas-outdoor.json (see assets/js/modules/date-picker.js).
  Add more ideas by editing those two JSON files — no code changes
  needed. Add a third category by following the pattern documented
  at the top of date-picker.js.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Kies een willekeurig date-idee, binnen of buiten.">
  <meta name="theme-color" content="#7B68EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <title>Date Ideeën</title>

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/date-ideas.css">
</head>
<body>
  <a class="skip-link" href="#main">Ga naar inhoud</a>

  <noscript>
    <p style="text-align:center; padding:1rem; background:#FFD700;">
      Deze pagina heeft JavaScript nodig om ideeën te kunnen kiezen.
    </p>
  </noscript>

  <header class="navbar">
    <div class="container nav">
      <div class="logo">Date ideeën</div>

      <button id="menuBtn" class="icon-btn" aria-label="Menu openen" aria-expanded="false" aria-controls="navLinks">☰</button>

      <nav id="navLinks" class="nav-links" aria-label="Hoofdmenu">
        <a href="index.html">Home</a>
        <a href="date.html">Date Ideeën</a>
        <a href="tournament.html">Toernooi</a>

        <div id="navMoreDropdown" class="nav-dropdown">
          <button id="navMoreBtn" class="nav-dropdown-trigger" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-controls="navMoreMenu">
            Meer <span class="chevron" aria-hidden="true">▾</span>
          </button>
          <div id="navMoreMenu" class="nav-dropdown-menu" role="menu"></div>
        </div>
      </nav>

      <div class="nav-actions">
        <div id="navSettingsDropdown" class="settings-dropdown">
          <button id="navSettingsBtn" class="icon-btn settings-trigger" type="button"
                  aria-haspopup="true" aria-expanded="false" aria-controls="navSettingsMenu" aria-label="Instellingen">⚙️</button>
          <div id="navSettingsMenu" class="settings-menu" role="menu" aria-label="Instellingen">
            <div class="settings-menu-heading">Instellingen</div>

            <div class="settings-item">
              <span class="settings-item-label">🌙 Dark mode</span>
              <button id="themeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet donkere modus aan"></button>
            </div>

            <div class="settings-item">
              <span class="settings-item-label">🎨 Pink theme</span>
              <button id="colorThemeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet roze thema aan"></button>
            </div>

            <!-- Auto-filled by assets/js/modules/settings-dropdown.js from
                 siteConfig.settings — disabled "Binnenkort" placeholders. -->
            <div id="settingsExtra"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="hero" class="hero">
      <div class="container">
        <h1>Activiteiten deze maand?</h1>
        <p>We laten dat lekker door lot beslissen...</p>

        <div class="hero-buttons">
          <button id="btnBinnen" class="btn btn-primary">Binnen activiteit</button>
          <button id="btnBuiten" class="btn btn-primary">Buiten activiteit</button>
        </div>
      </div>
    </section>

    <!-- Filled by assets/js/modules/date-picker.js. aria-live so screen
         reader users are told when a new idea appears, aria-busy while
         the (cached-after-first-load) JSON is being fetched. -->
    <div class="results">
      <div id="resultBinnen" class="result-box" aria-live="polite" aria-busy="false"></div>
      <div id="resultBuiten" class="result-box" aria-live="polite" aria-busy="false"></div>
    </div>
  </main>

  <button id="backToTop" class="icon-btn" aria-label="Naar boven scrollen">↑</button>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
