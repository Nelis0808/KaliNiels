<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Website</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <script src="script.js" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            async function showRandomIdea(fileName, resultId) {
                const container = document.getElementById(resultId);

                try {
                    const response = await fetch(fileName);
                    const text     = await response.text();

                    const ideas = text
                        .split("\n")
                        .map(line => line.trim())
                        .filter(line => line !== "");

                    const randomIdea = ideas[Math.floor(Math.random() * ideas.length)];

                    // alleen inhoud vervangen (niet container opnieuw opbouwen)
                    container.innerHTML = `<div class="card"><h3>${randomIdea}</h3></div>`;

                    const card = container.querySelector(".card");

                    // animation restart fix
                    requestAnimationFrame(() => {
                        card.classList.add("show");
                    });

                } catch (err) {
                    container.textContent = "Kon de ideeën niet laden.";
                    console.error(err);
                }
            }

            document.getElementById("btnBinnen").addEventListener("click", () => {
                showRandomIdea("dates-binnen.txt", "resultBinnen");
            });

            document.getElementById("btnBuiten").addEventListener("click", () => {
                showRandomIdea("dates-buiten.txt", "resultBuiten");
            });

        });
    </script>
    <style>
        @property --move-amount-btn { syntax: '<length>'; inherits: true; initial-value: 225px; }
        
        .hero-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            width: min(90%, var(--container));
            margin-inline: auto;
        }

        /* each result box */
        .result-box {
            width: 45%;
            min-height: 80px;
        }

        /* animation state */
        .card {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            filter: blur(6px);
            transition: all 0.4s ease;
        }

        /* when visible */
        .card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }
        .card-slot {
            min-height: 120px; /* voorkomt “springen” */
        }

        .card {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>
    <!-- Hero -->
    <section id="hero" class="hero" style="padding: 2rem 0;">
        <div class="container">
            <h1>Kies een leuke date activiteit</h1><br><br>
            <div class="hero-buttons">
                <button id="btnBinnen" class="btn btn-primary" style="border:none; transform: translateX(var(--move-amount-btn));">
                    Binnen activiteit
                </button>
                <button id="btnBuiten" class="btn btn-primary" style="border:none; transform: translateX(calc(-1 * var(--move-amount-btn)));">
                    Buiten activiteit
                </button>
            </div>
        </div>
    </section>
    
    <!-- Results -->
    <div class="results">
        <div class="result-box left">
            <div id="resultBinnen" class="card-slot"></div>
        </div>

        <div class="result-box right">
            <div id="resultBuiten" class="card-slot"></div>
        </div>
    </div>

    <!-- Homepage -->
    <section id="homepage" class="container" style="display:flex; justify-content:center; align-items:center;">
        <a href="homepage.html">
            <button class="btn btn-primary" style="font-size: 1.5rem; border: none">
                Homepage
            </button>
        </a>
    </section>

</body>
</html>
