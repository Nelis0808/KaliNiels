<!DOCTYPE html>
<!--
  DATE IDEAS PAGE
  Picks a random idea from assets/data/date-ideas-indoor.json or
  date-ideas-outdoor.json (see assets/js/modules/date-picker.js).
  Add more ideas by editing those two JSON files — no code changes
  needed. Add a third category by following the pattern documented
  at the top of date-picker.js.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Kies een willekeurig date-idee, binnen of buiten.">
  <meta name="theme-color" content="#7B68EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <title>Date Ideeën | OnzeSite</title>

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/date-ideas.css">
</head>
<body>
  <a class="skip-link" href="#main">Ga naar inhoud</a>

  <noscript>
    <p style="text-align:center; padding:1rem; background:#FFD700;">
      Deze pagina heeft JavaScript nodig om ideeën te kunnen kiezen.
    </p>
  </noscript>

  <header class="navbar">
    <div class="container nav">
      <div class="logo">OnzeSite</div>

      <button id="menuBtn" class="icon-btn" aria-label="Menu openen" aria-expanded="false" aria-controls="navLinks">☰</button>

      <nav id="navLinks" class="nav-links" aria-label="Hoofdmenu">
        <a href="index.html">Home</a>
        <a href="date.html">Date Ideeën</a>
        <a href="tournament.html">Toernooi</a>
      </nav>

      <div class="nav-actions">
        <button id="themeToggle" class="icon-btn" aria-label="Donkere modus" aria-pressed="false">🌙</button>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="hero" class="hero">
      <div class="container">
        <h1>Kies een leuke date activiteit</h1>
        <p>Geen zin om te kiezen? Laat het toeval beslissen.</p>

        <div class="hero-buttons">
          <button id="btnBinnen" class="btn btn-primary">Binnen activiteit</button>
          <button id="btnBuiten" class="btn btn-primary">Buiten activiteit</button>
        </div>
      </div>
    </section>

    <!-- Filled by assets/js/modules/date-picker.js. aria-live so screen
         reader users are told when a new idea appears, aria-busy while
         the (cached-after-first-load) JSON is being fetched. -->
    <div class="results">
      <div id="resultBinnen" class="result-box" aria-live="polite" aria-busy="false"></div>
      <div id="resultBuiten" class="result-box" aria-live="polite" aria-busy="false"></div>
    </div>

    <section id="to-index" class="container flex-center">
      <a href="index.html" class="btn btn-primary btn-lg">Homepage</a>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> OnzeSite</p>
    </div>
  </footer>

  <button id="backToTop" class="icon-btn" aria-label="Naar boven scrollen">↑</button>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
