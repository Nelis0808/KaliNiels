<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 200"
     width="200"
     height="200">

    <style>
        :root {
            /* ===== Customize these ===== */
            --chip-color: #525252;
            --text-size: 40px;
        }

        .chip { fill: var(--chip-color); }

        .stripe { fill: white; }

        .value {
            fill: var(--chip-color);
            font-family: Arial, Helvetica, sans-serif;
            font-size: var(--text-size);
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
        }
    </style>

    <!-- Outer rings -->
    <circle class="chip" cx="100" cy="100" r="90"/>
    <circle cx="100" cy="100" r="78" fill="white"/>
    <circle class="chip" cx="100" cy="100" r="68"/>

    <!-- Edge stripes -->
    <g class="stripe">
        <rect x="94" y="16" width="12" height="22" rx="3"/>
        <rect x="94" y="162" width="12" height="22" rx="3"/>

        <rect x="162" y="94" width="22" height="12" rx="3"/>
        <rect x="16" y="94" width="22" height="12" rx="3"/>

        <rect x="145" y="28" width="12" height="22" rx="3"
              transform="rotate(45 151 39)"/>
        <rect x="43" y="150" width="12" height="22" rx="3"
              transform="rotate(45 49 161)"/>

        <rect x="150" y="145" width="12" height="22" rx="3"
              transform="rotate(-45 156 156)"/>
        <rect x="28" y="43" width="12" height="22" rx="3"
              transform="rotate(-45 34 54)"/>
    </g>

    <!-- Center -->
    <circle cx="100" cy="100" r="50" fill="white"/>

    <!-- Change ONLY this value -->
    <text class="value" x="100" y="100">500</text>

</svg>