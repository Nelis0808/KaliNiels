<header class="navbar">
  <div class="container nav">
    <a class="logo" href="index.html">❤️ <span data-site-name>KaliNiels</span></a>

    <button id="menuBtn" class="icon-btn" aria-label="Menu openen" aria-expanded="false" aria-controls="navLinks">☰</button>

    <nav id="navLinks" class="nav-links" aria-label="Hoofdmenu">
      <a href="index.html">Home</a>
      <a href="date.html">Date Ideeën</a>
      <a href="ticketmaster.html">Ticketmaster</a>

      <div id="navMoreDropdown" class="nav-dropdown">
        <button id="navMoreBtn" class="nav-dropdown-trigger" type="button"
                aria-haspopup="true" aria-expanded="false" aria-controls="navMoreMenu">
          Meer <span class="chevron" aria-hidden="true">▾</span>
        </button>
        <div id="navMoreMenu" class="nav-dropdown-menu" role="menu"></div>
      </div>
    </nav>

    <div class="nav-actions">
      <div id="navProfileDropdown" class="settings-dropdown profile-dropdown">
        <button id="navProfileBtn" class="icon-btn settings-trigger" type="button"
                aria-haspopup="true" aria-expanded="false" aria-controls="navProfileMenu" aria-label="Profiel — inloggen">
          <span id="navProfileIcon" aria-hidden="true">👤</span>
        </button>
        <div id="navProfileMenu" class="settings-menu profile-menu" role="menu" aria-label="Profiel">
          <div class="settings-menu-heading">Profiel</div>

          <!-- LOGGED OUT: one shared passphrase login for the whole site
               (Onze Foto's, Onze Reizen, BlackJack, Spiderette — see
               assets/js/modules/auth.js). -->
          <div id="profileLoggedOut" class="profile-view">
            <p class="profile-hint">Log in om Onze Foto's, Onze Reizen en de spellen met chips te ontgrendelen.</p>
            <form id="profileLoginForm" class="profile-login-form">
              <label for="profilePassphrase" class="sr-only">Wachtwoord</label>
              <input type="password" id="profilePassphrase" placeholder="Wachtwoord" autocomplete="current-password" required>
              <button type="submit" class="btn btn-primary btn-sm">Inloggen</button>
            </form>
            <p id="profileLoginError" class="profile-login-error" role="alert"></p>
          </div>

          <!-- LOGGED IN -->
          <div id="profileLoggedIn" class="profile-view hidden">
            <p class="profile-hint">Ingelogd als <strong id="profileWhoLabel"></strong></p>
            <button type="button" id="profileLogoutBtn" class="btn btn-outline btn-sm profile-logout-btn">Uitloggen</button>
          </div>
        </div>
      </div>

      <div id="navSettingsDropdown" class="settings-dropdown">
        <button id="navSettingsBtn" class="icon-btn settings-trigger" type="button"
                aria-haspopup="true" aria-expanded="false" aria-controls="navSettingsMenu" aria-label="Instellingen">⚙️</button>
        <div id="navSettingsMenu" class="settings-menu" role="menu" aria-label="Instellingen">
          <div class="settings-menu-heading">Instellingen</div>

          <div class="settings-item">
            <span class="settings-item-label">🌙 Dark mode</span>
            <button id="themeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet donkere modus aan"></button>
          </div>

          <div class="settings-item">
            <span class="settings-item-label">🎨 Pink theme</span>
            <button id="colorThemeToggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Zet roze thema aan"></button>
          </div>

          <!-- Auto-filled by assets/js/modules/settings-dropdown.js from
               siteConfig.settings — disabled "Binnenkort" placeholders. -->
          <div id="settingsExtra"></div>
        </div>
      </div>
    </div>
  </div>
</header>
